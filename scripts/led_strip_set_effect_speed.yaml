alias: "LED Strip - Set Effect Speed"
description: "Set the speed of effects (1-100)."
fields:
  led_strip:
    name: "LED Strip"
    description: "Select the Aqara T1 LED strip device"
    required: true
    selector:
      device:
        integration: zha
  speed:
    name: "Speed"
    description: "Effect speed (1-100)."
    required: true
    selector:
      number:
        min: 1
        max: 100
        step: 1
        mode: box
sequence:
  - action: zha_toolkit.attr_write
    data:
      ieee: >-
        {{ device_attr(led_strip, 'identifiers') | selectattr(0,'eq','zha')
        | map(attribute=1) | first }}
      endpoint: 1
      cluster: 64704
      attribute: 1312
      attr_val: "{{ speed | int }}"
      manf: 4447
