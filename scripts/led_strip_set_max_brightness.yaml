alias: "LED Strip - Set Max Brightness"
description: "Set the maximum brightness level (1-100%)."
fields:
  led_strip:
    name: "LED Strip"
    description: "Select the Aqara T1 LED strip device"
    required: true
    selector:
      device:
        integration: zha
  max_brightness:
    name: "Max Brightness (%)"
    description: "Maximum brightness level (1-100)."
    required: true
    selector:
      number:
        min: 1
        max: 100
        step: 1
        mode: box
        unit_of_measurement: "%"
sequence:
  - action: zha_toolkit.attr_write
    data:
      ieee: >-
        {{ device_attr(led_strip, 'identifiers') | selectattr(0,'eq','zha')
        | map(attribute=1) | first }}
      endpoint: 1
      cluster: 64704
      attribute: 1302
      attr_val: "{{ max_brightness | int }}"
      manf: 4447
