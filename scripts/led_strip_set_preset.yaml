alias: "LED Strip - Set Preset"
description: "Select a preset (1-32)."
fields:
  led_strip:
    name: "LED Strip"
    description: "Select the Aqara T1 LED strip device"
    required: true
    selector:
      device:
        integration: zha
  preset:
    name: "Preset"
    description: "Preset index (1-32)."
    required: true
    selector:
      number:
        min: 1
        max: 32
        step: 1
        mode: box
sequence:
  - action: zha_toolkit.attr_write
    data:
      ieee: >-
        {{ device_attr(led_strip, 'identifiers') | selectattr(0,'eq','zha')
        | map(attribute=1) | first }}
      endpoint: 1
      cluster: 64704
      attribute: 1311
      attr_val: "{{ preset | int }}"
      manf: 4447
